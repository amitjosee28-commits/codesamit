<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found Sorry | Amit Joshi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #050a1a;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-color: #00f0ff;
            --accent-purple: #a855f7;
            --accent-glow: rgba(0, 240, 255, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Portfolio Particle Background Grid */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .error-wrapper {
            text-align: center;
            z-index: 10;
            max-width: 700px;
            width: 90%;
            padding: 2rem;
        }

        /* 404 Moving Illustration Container */
        .illustration-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 2rem;
            user-select: none;
        }

        .digit {
            background: linear-gradient(135deg, #ffffff, #6b7280);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        /* The Zero acting as a window portal frame */
        .portal-zero {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 1rem;
            border-radius: 50%;
            background: rgba(0, 240, 255, 0.05);
            border: 8px solid var(--accent-color);
            box-shadow: 0 0 25px var(--accent-glow), inset 0 0 20px rgba(0, 240, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Moving Character looking around inside the 0 */
        .cyber-character {
            font-size: 5.5rem;
            position: absolute;
            bottom: -10px;
            animation: lookAround 6s ease-in-out infinite;
            filter: drop-shadow(0 0 8px var(--accent-purple));
        }

        @keyframes lookAround {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            20% { transform: translateY(5px) scale(1.02) rotate(-5deg); }
            40% { transform: translateY(-5px) translateX(-10px) rotate(5deg); }
            60% { transform: translateY(-5px) translateX(10px) rotate(-5deg); }
            80% { transform: translateY(2px) scale(0.98) rotate(0deg); }
        }

        /* Floating Interactive Air Balloon Link */
        .air-balloon {
            position: absolute;
            top: -50px;
            right: 15%;
            font-size: 3.5rem;
            cursor: pointer;
            text-decoration: none;
            filter: drop-shadow(0 0 12px var(--accent-color));
            animation: floatBalloon 4.5s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 15;
            transition: transform 0.3s ease;
        }

        .air-balloon:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 0 20px var(--accent-purple));
        }

        /* Small text label anchored underneath the moving balloon */
        .balloon-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #ffffff;
            background: rgba(168, 85, 247, 0.7);
            padding: 2px 8px;
            border-radius: 12px;
            margin-top: -5px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        @keyframes floatBalloon {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-20px) translateX(8px); }
        }

        /* Cybernetic Wave Layer underneath the text */
        .cyber-fog {
            position: absolute;
            bottom: -20px;
            width: 120%;
            height: 60px;
            background: radial-gradient(ellipse at center, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            animation: pulseFog 4s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes pulseFog {
            0% { transform: scaleX(0.9); opacity: 0.5; }
            100% { transform: scaleX(1.1); opacity: 0.9; }
        }

        /* Content Text Formatting */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            margin-bottom: 2rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            padding: 0.8rem 1.6rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background-color: rgba(0, 240, 255, 0.08);
            color: var(--accent-color);
            border: 1px solid rgba(0, 240, 255, 0.2);
        }

        .btn:hover {
            background-color: var(--accent-color);
            color: #050a1a;
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Shared Matrix Portfolio Background Animation -->
    <canvas id="particle-canvas"></canvas>

    <div class="error-wrapper">
        
        <!-- Interactive Graphics Layer Grid -->
        <div class="illustration-box">
            <span class="digit">4</span>
            
            <!-- Window Portal Frame for the 0 element -->
            <div class="portal-zero">
                <div class="cyber-character">
                    <i class="fa-solid fa-user-astronaut" style="color: #ffffff;"></i>
                </div>
            </div>
            
            <span class="digit">4</span>

            <!-- Floating Hot Air Balloon Link inspired by Screen Shot 2026-05-29 at 08.54.25.png -->
            <a href="https://amitjoshi.info.np/" class="air-balloon" title="Click to fly back home!">
                <i class="fa-solid fa-hot-tub-person" style="color: var(--accent-purple); transform: rotate(180deg); margin-bottom:-5px;"></i>
                <i class="fa-solid fa-lightbulb" style="color: var(--accent-color);"></i>
                <span class="balloon-label">Fly Home</span>
            </a>
            
            <div class="cyber-fog"></div>
        </div>

        <h1>404 Not Found Sorry</h1>
        <p>Oops... looks like you got lost in space. Get back home by clicking the buttons or the floating air balloon up above.</p>
        
        <a href="https://amitjoshi.info.np/" class="btn">
            <i class="fa-solid fa-house-rocket"></i> Return to Main Deck
        </a>
    </div>

    <script>
        // Background Grid Fluid Animation Logic
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        const numberOfParticles = 90;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = (Math.random() * 2) + 0.5;
                this.speedX = (Math.random() * 0.6) - 0.3;
                this.speedY = (Math.random() * 0.6) - 0.3;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX = -this.speedX;
                if (this.y < 0 || this.y > canvas.height) this.speedY = -this.speedY;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 240, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                        + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width / 8) * (canvas.height / 8)) {
                        let opacityValue = 1 - (distance / 25000);
                        ctx.strokeStyle = `rgba(0, 240, 255, ${opacityValue * 0.12})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connect();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particlesArray = [];
            init();
        });

        init();
        animate();
    </script>
</body>
</html>
